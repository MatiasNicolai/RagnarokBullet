<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ragnarok Bullet Hell</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0a0a12; overflow: hidden; }
    #game { display: flex; justify-content: center; align-items: center; height: 100%; }
    canvas { image-rendering: pixelated; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 18px;
      background: #0a0a12; color: #f2c14e; z-index: 10;
      font-family: Georgia, 'Times New Roman', serif;
    }
    #loading .title { font-size: 34px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 2px 6px #000; }
    #loading .sub { font-size: 15px; color: #bfc6dd; font-family: monospace; }
    #loading .spin {
      width: 34px; height: 34px; border: 4px solid #2a3350; border-top-color: #f2c14e;
      border-radius: 50%; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="title">RAGNAROK BULLET HELL</div>
    <div class="spin"></div>
    <div class="sub">Cargando recursos…</div>
  </div>
  <div id="game"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
